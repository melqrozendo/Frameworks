<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <!-- bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
     rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" 
     crossorigin="anonymous">
</head>
<body>
    <div class="container-sm py-1 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-1">
        Configuração de cores em Bootstrap 1
    </div>
    <div class="container-md py-2 text-secondary-emphasis bg-secondary-subtle border border-secondary-subtle rounded-2">
        Configuração de cores em Bootstrap 2
    </div>
    <div class="container-xl py-3 text-success-emphasis bg-success-subtle border border-success-subtle rounded-3">
        Configuração de cores em Bootstrap 3
    </div>
    <div class="container-xxl py-4 text-danger-emphasis bg-danger-subtle border border-danger-subtle rounded-4">
        Configuração de cores em Bootstrap 4
    </div>
    <div class="container-xxl py-5 text-warning-emphasis bg-warning-subtle border border-warning-subtle rounded-5">
        Configuração de cores em Bootstrap 5
    </div>
    <div class="container-fluid py-5 text-info-emphasis bg-info-subtle border border-info-subtle rounded-3">
        Configuração de cores em Bootstrap 6
    </div>
    <div class="container-fluid py-5 text-light-emphasis bg-light-subtle border border-light-subtle rounded-4">
        Configuração de cores em Bootstrap 7
    </div>
    <div class="container-fluid py-3 text-dark-emphasis bg-dark-subtle border border-dark-subtle rounded-4">
        Configuranção de cores em Bootstrap 8
    </div>
    <!-- bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" 
    crossorigin="anonymous"></script>
</body>
</html>
